services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - myNetwork

  backend:
    build: "./Backend"
    networks:
      - myNetwork
    depends_on:
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MONGODB_URI=${MONGODB_URI}

  frontend:
    build: "./frontend"
    networks:
      - myNetwork
    depends_on:
      - backend

  redis:
    image: redis:7.4
    networks:
      - myNetwork

networks:
  myNetwork:
    driver: bridge